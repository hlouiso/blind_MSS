name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
          # OpenMP runtime ships with gcc (libgomp); nothing extra needed.

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp openssl@3 pkg-config

      - name: Build and run tests
        run: make test

      - name: Build all binaries
        run: make all
